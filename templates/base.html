<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Asia Briefing{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="site-title" href="{{ url_for('index') }}">
        <span class="brand-mark">AB</span>
        <span class="brand-text">Asia Briefing<small>ベトナム & チェンマイ ニュース日本語版</small></span>
      </a>
    </div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <small>Sources: VnExpress / Tuoi Tre / Thanh Nien · Translated &amp; curated by Claude</small>
  </footer>
</body>
</html>
